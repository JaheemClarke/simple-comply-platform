server {
    listen 80;
    server_name simplecomplygy.com www.simplecomplygy.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name simplecomplygy.com www.simplecomplygy.com;

    ssl_certificate /etc/letsencrypt/live/simplecomplygy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/simplecomplygy.com/privkey.pem;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
